<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فحص نهائي</title>
</head>
<body style="background:#000; color:#d4af37; text-align:center; padding-top:100px; font-family:sans-serif;">

    <h2>⚜️ فحص الاتصال النهائي</h2>
    <p>اضغط الزر، إذا فتحت صفحة بيضاء مكتوب فيها "ok:true" <br> فستجد الرسالة وصلت لهاتفك فوراً.</p>

    <button onclick="forceSend()" style="padding:20px 40px; font-size:20px; cursor:pointer; background:#d4af37; border:none; border-radius:15px; font-weight:bold;">
        إرسال رسالة "تم" الآن
    </button>

    <script>
        function forceSend() {
            const T = '8736983183:AAHZI864nf1nxjmOlqsAnwhSoK9K2VR5W7Y';
            const C = '5156556639';
            
            // هذه الطريقة تفتح الرابط في صفحة جديدة (لا يمكن حظرها نهائياً)
            // بمجرد ضغط الزر، سيتم إرسال الرسالة رغماً عن حماية المتصفح
            const url = `https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=✅ تم الاتصال بنجاح من المتصفح!`;
            
            window.location.href = url; 
        }
    </script>
</body>
</html>
