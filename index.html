<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار البوت</title>
</head>
<body style="background: #000; color: #fff; text-align: center; padding-top: 50px; font-family: sans-serif;">

    <h2>⚜️ اختبار اتصال تليجرام</h2>
    <p>اضغط الزر لتجربة إرسال رسالة "Hello" للبوت</p>
    
    <button onclick="testBot()" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #d4af37; border: none; border-radius: 10px; font-weight: bold;">
        إرسال رسالة تجريبية
    </button>

    <p id="res" style="margin-top: 20px; color: #888;"></p>

    <script>
        // التوكن والأيدي الخاص بك
        const T = '8736983183:AAHZI864nf1nxjmOlqsAnwhSoK9K2VR5W7Y';
        const C = '5156556639';

        async function testBot() {
            const status = document.getElementById('res');
            status.innerText = "جاري المحاولة...";

            const url = `https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=✅ تم الاتصال بنجاح! كود الاختبار يعمل.`;

            try {
                // استخدام Image Beacon لتخطي حماية CORS نهائياً في الاختبار
                const img = new Image();
                img.onload = () => { status.innerText = "✅ تم الإرسال! افحص تليجرام الآن."; };
                img.onerror = () => { status.innerText = "❌ فشل الإرسال (تأكد من التوكن أو اضغط Start للبوت)"; };
                img.src = url;

            } catch (e) {
                status.innerText = "❌ حدث خطأ برمجياً.";
            }
        }
    </script>
</body>
</html>
