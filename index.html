<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فحص اتصال البوت</title>
</head>
<body style="background: #0b0e14; color: #d4af37; text-align: center; padding-top: 100px; font-family: sans-serif;">

    <h2>⚜️ اختبار اتصال تليجرام</h2>
    <p style="color: #888;">اضغط الزر أدناه للتأكد من وصول الرسائل</p>
    
    <button onclick="test()" style="padding: 15px 40px; font-size: 18px; cursor: pointer; background: #d4af37; border: none; border-radius: 10px; font-weight: bold; color: black;">
        إرسال رسالة تجريبية
    </button>

    <p id="msg" style="margin-top: 20px; font-weight: bold;"></p>

    <script>
        function test() {
            const T = '8736983183:AAHZI864nf1nxjmOlqsAnwhSoK9K2VR5W7Y';
            const C = '5156556639';
            const status = document.getElementById('msg');
            
            status.innerText = "جاري الإرسال...";
            status.style.color = "#888";

            // استخدام تقنية Image Beacon لتخطي الـ CORS والحماية نهائياً
            // المتصفح سيعامل الرابط كأنه طلب تحميل صورة ولن يحظره
            const i = new Image();
            
            i.onload = function() {
                status.innerText = "✅ وصلت الرسالة! البوت يعمل.";
                status.style.color = "#00ff00";
            };
            
            i.onerror = function() {
                status.innerText = "❌ فشل الإرسال (تأكد من التوكن أو ضغط Start)";
                status.style.color = "#ff4444";
            };

            i.src = `https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=✅ تم الاتصال بنجاح من صفحة الـ HTML!`;
        }
    </script>
</body>
</html>
